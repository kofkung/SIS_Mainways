services:
  - type: web
    name: sis-mainways
    runtime: static
    repo: https://github.com/kofkung/SIS_Mainways
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
